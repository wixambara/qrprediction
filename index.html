<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Prediction - Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center p-6 text-slate-900">

    <div class="w-full max-w-xs space-y-8">
        <header class="text-center">
            <h1 class="text-sm font-semibold tracking-widest uppercase text-slate-400">QR Prediction</h1>
        </header>

        <div class="space-y-4">
            <input 
                type="text" 
                id="prediction-input" 
                placeholder="Ketik data..." 
                class="w-full bg-slate-50 border-none px-4 py-3 rounded-lg focus:ring-2 focus:ring-slate-200 outline-none transition-all text-center"
            >
            <button 
                id="submit-btn" 
                disabled
                class="w-full bg-slate-900 text-white py-3 rounded-lg font-medium hover:bg-slate-800 disabled:bg-slate-100 disabled:text-slate-300 transition-all active:scale-95"
            >
                Update
            </button>
        </div>

        <div class="pt-8 border-t border-slate-100 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-2">Live Data</p>
            <div id="live-value" class="text-lg font-medium text-slate-800 italic">...</div>
        </div>
    </div>

    <!-- Minimalist Debug Console -->
    <div id="debug-log" class="fixed bottom-0 left-0 right-0 h-16 bg-slate-50 border-t border-slate-100 overflow-y-auto px-4 py-2 font-mono text-[9px] text-slate-400 flex flex-col-reverse">
        <div>[System] Menunggu koneksi...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsdaCltUZPkg0kl7-BIY-xfbkTnypyfxM",
            authDomain: "qrpredictionwix.firebaseapp.com",
            databaseURL: "https://qrpredictionwix-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrpredictionwix",
            storageBucket: "qrpredictionwix.firebasestorage.app",
            messagingSenderId: "1045444279571",
            appId: "1:1045444279571:web:02a98dec1d28c743d9aee6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const input = document.getElementById('prediction-input');
        const submitBtn = document.getElementById('submit-btn');
        const debugLog = document.getElementById('debug-log');
        const liveValue = document.getElementById('live-value');

        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            debugLog.prepend(div);
        }

        signInAnonymously(auth).then(() => log("Auth ok.")).catch(e => log("Auth err: " + e.message));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                submitBtn.disabled = false;
                const targetRef = ref(db, 'predictions/input');
                onValue(targetRef, (snap) => {
                    liveValue.textContent = snap.val() || "-";
                    log(`Sync: ${snap.val()}`);
                });
            }
        });

        submitBtn.onclick = async () => {
            const val = input.value.trim();
            if (!val) return;

            submitBtn.disabled = true;
            try {
                await set(ref(db, 'predictions/input'), val);
                input.value = "";
                log("Updated.");
            } catch (e) {
                log("Err: " + e.message);
            } finally {
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html
