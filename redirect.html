<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My QR Online - Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .loader-spin {
            width: 16px;
            height: 16px;
            border: 2px solid #f1f5f9;
            border-bottom-color: #2563eb;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 0.4s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: #2563eb;
            transition: width 0.5s cubic-bezier(0.1, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 text-slate-900">

    <div class="w-full max-w-xs bg-white p-10 rounded-[2rem] shadow-xl shadow-slate-200/50 text-center space-y-8">
        
        <div class="flex flex-col items-center space-y-3">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3H9V9H3V3ZM5 5V7H7V5H5Z" fill="white"/>
                    <path d="M15 3H21V9H15V3ZM17 5V7H19V5H17Z" fill="white"/>
                    <path d="M3 15H9V21H3V15ZM5 17V19H7V17H5Z" fill="white"/>
                    <path d="M15 15H17V17H15V15Z" fill="white"/>
                    <path d="M19 15H21V17H19V15Z" fill="white"/>
                    <path d="M17 17H19V19H17V17Z" fill="white"/>
                    <path d="M15 19H17V21H15V19Z" fill="white"/>
                    <path d="M19 19H21V21H19V19Z" fill="white"/>
                    <path d="M11 3H13V5H11V3Z" fill="white"/>
                    <path d="M11 7H13V9H11V7Z" fill="white"/>
                    <path d="M11 11H13V13H11V11Z" fill="white"/>
                    <path d="M3 11H5V13H3V11Z" fill="white"/>
                    <path d="M7 11H9V13H7V11Z" fill="white"/>
                    <path d="M15 11H17V13H15V11Z" fill="white"/>
                    <path d="M19 11H21V13H19V11Z" fill="white"/>
                    <path d="M11 15H13V17H11V15Z" fill="white"/>
                    <path d="M11 19H13V21H11V19Z" fill="white"/>
                </svg>
            </div>
            <div class="space-y-1">
                <h1 class="text-lg font-bold tracking-tight text-slate-800">My QR Online</h1>
                <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest">Free Generator Service</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="w-full h-1 bg-slate-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="bar-fill"></div>
            </div>
            <div class="flex items-center justify-center gap-2 text-slate-400">
                <span class="loader-spin"></span>
                <span id="status-msg" class="text-[10px] font-bold uppercase tracking-wider">Preparing link...</span>
            </div>
        </div>

        <div class="pt-4">
            <p class="text-[9px] text-slate-300 font-medium">© 2024 myqronline.com. All rights reserved.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsdaCltUZPkg0kl7-BIY-xfbkTnypyfxM",
            authDomain: "qrpredictionwix.firebaseapp.com",
            databaseURL: "https://qrpredictionwix-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrpredictionwix",
            storageBucket: "qrpredictionwix.firebasestorage.app",
            messagingSenderId: "1045444279571",
            appId: "1:1045444279571:web:02a98dec1d28c743d9aee6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const statusMsg = document.getElementById('status-msg');
        const progressBar = document.getElementById('progress-bar');

        async function startEngine() {
            try {
                setTimeout(() => progressBar.style.width = '100%', 10);
                await signInAnonymously(auth);
                const snapshot = await get(ref(db, 'predictions'));
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const input = data.input || "";
                    const site = data.site || "google";
                    statusMsg.innerText = "Redirecting to source...";

                    let finalUrl = "";
                    const encodedInput = site === 'imdb' ? encodeURIComponent(input) : input.replace(/\s+/g, '+');
                    
                    if (site === 'tokopedia') {
                        finalUrl = `https://www.tokopedia.com/search?q=${encodedInput}`;
                    } else if (site === 'google') {
                        finalUrl = `https://www.google.com/search?q=${encodedInput}`;
                    } else if (site === 'imdb') {
                        finalUrl = `https://m.imdb.com/find/?q=${encodedInput}`;
                    }

                    setTimeout(() => window.location.href = finalUrl, 500);
                } else {
                    window.location.href = "https://www.google.com";
                }
            } catch (err) {
                window.location.href = "https://www.google.com";
            }
        }
        window.onload = startEngine;
    </script>
</body>
</html>
