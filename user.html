<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Notes</title>
    
    <!-- Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" content="#ffffff">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        .slide-up-enter {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .slide-up-active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <div class="app-container flex flex-col">
        
        <!-- Layar Utama -->
        <div id="mainScreen" class="flex-1 flex flex-col w-full h-full">
            <header class="flex justify-between items-center px-6 py-5 bg-white sticky top-0 z-10">
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Catatan</h1>
                <button id="settingsBtn" class="text-slate-300 hover:text-slate-500 p-2 -mr-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </header>

            <main class="flex-1 px-5 pb-24 overflow-y-auto">
                <div id="notesContainer" class="flex flex-col gap-3">
                    <!-- Notes dirender di sini -->
                </div>
            </main>

            <button id="addNoteBtn" class="absolute bottom-8 right-6 bg-slate-900 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg shadow-slate-900/20 active:scale-95 transition-all z-20">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>

        <!-- Full Screen Editor -->
        <div id="editorScreen" class="absolute inset-0 bg-white z-40 slide-up-enter flex flex-col hidden">
            <header class="flex justify-between items-center px-4 py-4 bg-white z-10 border-b border-slate-100">
                <button id="closeEditorBtn" class="p-2 text-slate-500 hover:text-slate-800 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <button id="saveNoteBtn" class="px-4 py-1.5 bg-slate-900 text-white text-sm font-semibold rounded-full active:scale-95 transition-all">
                    Simpan
                </button>
            </header>

            <div class="flex-1 flex flex-col px-6 py-5 overflow-y-auto">
                <input type="text" id="noteTitleInput" placeholder="Judul Catatan" class="w-full text-xl font-bold outline-none mb-3 placeholder:text-slate-300 text-slate-900 bg-transparent">
                <p class="text-xs text-slate-400 mb-5 font-medium" id="dateDisplay"></p>
                <textarea id="noteContentInput" placeholder="Mulai mengetik..." class="w-full flex-1 outline-none resize-none placeholder:text-slate-300 text-slate-700 text-base leading-relaxed bg-transparent"></textarea>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" class="absolute inset-0 bg-white z-50 hidden flex-col">
            <div class="px-6 py-5 flex justify-between items-center bg-white border-b border-slate-100">
                <h2 class="text-lg font-bold">Pengaturan Sistem</h2>
                <button id="closeSettingsModal" class="p-2 bg-slate-100 rounded-full text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <div class="p-6 space-y-8 overflow-y-auto flex-1 flex flex-col">
                <div class="space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400">Target URL</h3>
                    <div class="flex flex-col gap-2">
                        <button data-site="google" class="site-btn w-full py-3.5 text-sm font-bold rounded-xl bg-slate-900 text-white transition-none border border-slate-900">GOOGLE</button>
                        <button data-site="tokopedia" class="site-btn w-full py-3.5 text-sm font-bold rounded-xl bg-white text-slate-500 border border-slate-200 transition-none">TOKOPEDIA</button>
                        <button data-site="imdb" class="site-btn w-full py-3.5 text-sm font-bold rounded-xl bg-white text-slate-500 border border-slate-200 transition-none">IMDb</button>
                    </div>
                </div>

                <div class="space-y-2 p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400">Status Database</h3>
                    <p id="live-status" class="text-sm font-medium text-slate-700">Menghubungkan...</p>
                </div>

                <div class="pt-2 space-y-4 text-center">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400">QR Code Target</h3>
                    <div class="flex flex-col items-center gap-4">
                        <div class="p-2 bg-white border border-slate-200 rounded-2xl shadow-sm inline-block">
                            <img id="target-qr-img" class="w-36 h-36" alt="QR Code">
                        </div>
                        <button id="download-qr" class="text-[11px] font-bold text-slate-900 bg-slate-100 px-5 py-2.5 rounded-full uppercase tracking-widest active:scale-95 transition-transform">
                            Download QR
                        </button>
                    </div>
                </div>
                
                <!-- Spacer buat dorong teks ke paling bawah -->
                <div class="flex-1"></div>
                
                <!-- Subtle Credit -->
                <div class="text-center pt-8 pb-4">
                    <p class="text-[10px] text-slate-300 font-medium tracking-wide">made by Heri Sanjaya</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsdaCltUZPkg0kl7-BIY-xfbkTnypyfxM",
            authDomain: "qrpredictionwix.firebaseapp.com",
            databaseURL: "https://qrpredictionwix-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrpredictionwix",
            storageBucket: "qrpredictionwix.firebasestorage.app",
            messagingSenderId: "1045444279571",
            appId: "1:1045444279571:web:02a98dec1d28c743d9aee6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const notesContainer = document.getElementById('notesContainer');
        const editorScreen = document.getElementById('editorScreen');
        const settingsModal = document.getElementById('settingsModal');
        
        const addNoteBtn = document.getElementById('addNoteBtn');
        const closeEditorBtn = document.getElementById('closeEditorBtn');
        const saveNoteBtn = document.getElementById('saveNoteBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const closeSettingsModal = document.getElementById('closeSettingsModal');
        
        const titleInput = document.getElementById('noteTitleInput');
        const contentInput = document.getElementById('noteContentInput');
        const dateDisplay = document.getElementById('dateDisplay');
        
        const siteBtns = document.querySelectorAll('.site-btn');
        const liveStatus = document.getElementById('live-status');
        const qrImg = document.getElementById('target-qr-img');
        const downloadBtn = document.getElementById('download-qr');

        let selectedSite = 'google';
        let localNotes = [
            { id: 1, title: 'Ide Proyek', content: 'Cari referensi desain minimalis warna putih, jangan lupa cek Tailwind.', date: 'Kemarin' },
            { id: 2, title: '', content: 'Beli kopi, gula, sama cemilan buat nanti malam.', date: '2 Hari lalu' }
        ]; 
        
        const targetUrl = "https://myqronline.vercel.app/redirect.html";

        function renderNotes() {
            notesContainer.innerHTML = localNotes.map(note => {
                const safeTitle = note.title.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeContent = note.content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                return `
                <div class="bg-white border border-slate-200 rounded-2xl p-4 active:bg-slate-50 transition-colors">
                    ${safeTitle ? `<h3 class="font-bold text-slate-800 text-[15px] mb-1 truncate">${safeTitle}</h3>` : ''}
                    <p class="text-sm text-slate-500 line-clamp-2 leading-relaxed break-words">${safeContent || 'Tidak ada teks'}</p>
                    <div class="mt-3 text-[11px] font-semibold text-slate-400 uppercase tracking-wide">${note.date}</div>
                </div>
            `}).join('');
        }

        function getFormattedDate() {
            const now = new Date();
            return now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        renderNotes();
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(targetUrl)}`;

        function updateSiteUI(site) {
            selectedSite = site;
            siteBtns.forEach(btn => {
                if (btn.getAttribute('data-site') === site) {
                    btn.className = "site-btn w-full py-3.5 text-sm font-bold rounded-xl bg-slate-900 text-white transition-none border border-slate-900";
                } else {
                    btn.className = "site-btn w-full py-3.5 text-sm font-bold rounded-xl bg-white text-slate-500 border border-slate-200 transition-none";
                }
            });
        }
        siteBtns.forEach(btn => btn.onclick = () => updateSiteUI(btn.getAttribute('data-site')));

        addNoteBtn.onclick = () => {
            titleInput.value = '';
            contentInput.value = '';
            dateDisplay.textContent = getFormattedDate();
            
            editorScreen.classList.remove('hidden');
            requestAnimationFrame(() => {
                editorScreen.classList.add('slide-up-active');
            });
            setTimeout(() => contentInput.focus(), 300);
        };

        closeEditorBtn.onclick = () => {
            editorScreen.classList.remove('slide-up-active');
            setTimeout(() => {
                editorScreen.classList.add('hidden');
            }, 300);
        };
        
        settingsBtn.onclick = () => {
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
        };
        closeSettingsModal.onclick = () => {
            settingsModal.classList.add('hidden');
            settingsModal.classList.remove('flex');
        };

        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'predictions/input'), (snap) => {
                    liveStatus.textContent = `Prediksi Aktif: "${snap.val() || 'Kosong'}"`;
                });
            }
        });

        saveNoteBtn.onclick = async () => {
            const titleVal = titleInput.value.trim();
            const contentVal = contentInput.value.trim();
            const predictionText = contentVal || titleVal;
            
            if (!predictionText) {
                closeEditorBtn.onclick();
                return;
            }

            saveNoteBtn.disabled = true;
            saveNoteBtn.textContent = "Loading...";

            try {
                await Promise.all([
                    set(ref(db, 'predictions/input'), predictionText),
                    set(ref(db, 'predictions/site'), selectedSite)
                ]);

                localNotes.unshift({
                    id: Date.now(),
                    title: titleVal,
                    content: contentVal,
                    date: 'Baru saja'
                });
                renderNotes();

            } catch (e) {
                console.error("Gagal simpan:", e);
            } finally {
                saveNoteBtn.disabled = false;
                saveNoteBtn.textContent = "Simpan";
                closeEditorBtn.onclick();
            }
        };

        downloadBtn.onclick = async () => {
            try {
                const response = await fetch(qrImg.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'target-qr.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (err) {
                window.open(qrImg.src, '_blank');
            }
        };
    </script>
</body>
</html>
