<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Prediction Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center p-6 text-slate-900">

    <div class="w-full max-w-xs space-y-8">
        <header class="text-center">
            <h1 class="text-[10px] font-bold tracking-[0.25em] uppercase text-slate-300">Simple QR Prediction</h1>
        </header>

        <div class="space-y-6">
            <!-- Input Field -->
            <input 
                type="text" 
                id="prediction-input" 
                placeholder="Prediction text..." 
                class="w-full bg-slate-50 border-none px-4 py-4 rounded-xl focus:ring-2 focus:ring-slate-100 outline-none text-center text-sm font-semibold"
            >

            <!-- Site Selection -->
            <div class="space-y-3">
                <p class="text-[9px] text-center font-bold uppercase tracking-widest text-slate-400">Target Site</p>
                <div class="flex gap-2">
                    <button data-site="google" class="site-btn flex-1 py-2.5 text-[10px] font-bold rounded-lg transition-none">GOOGLE</button>
                    <button data-site="tokopedia" class="site-btn flex-1 py-2.5 text-[10px] font-bold rounded-lg transition-none">TOKOPEDIA</button>
                    <button data-site="imdb" class="site-btn flex-1 py-2.5 text-[10px] font-bold rounded-lg transition-none">IMDb</button>
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                id="submit-btn" 
                disabled
                class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest disabled:bg-slate-100 disabled:text-slate-300 active:scale-95 transition-all"
            >
                Submit
            </button>
        </div>

        <!-- Target QR Display -->
        <div class="pt-8 border-t border-slate-50 text-center space-y-4">
            <p class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">Your Target QR Code</p>
            <div class="flex flex-col items-center gap-4">
                <div class="p-2 bg-white border border-slate-100 rounded-2xl shadow-sm">
                    <img id="target-qr-img" class="w-32 h-32" alt="QR Code">
                </div>
                <button id="download-qr" class="text-[10px] font-bold text-blue-500 hover:text-blue-700 uppercase tracking-tight underline">
                    Download QR to Device
                </button>
            </div>
        </div>

        <div class="text-center">
            <p id="live-status" class="text-[10px] font-medium text-slate-300 italic">Syncing with database...</p>
        </div>
    </div>

    <!-- Hidden Debug Console (Very Minimal) -->
    <div id="debug-log" class="fixed bottom-0 left-0 right-0 h-8 bg-slate-50/30 px-4 py-2 font-mono text-[8px] text-slate-300 overflow-hidden pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsdaCltUZPkg0kl7-BIY-xfbkTnypyfxM",
            authDomain: "qrpredictionwix.firebaseapp.com",
            databaseURL: "https://qrpredictionwix-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrpredictionwix",
            storageBucket: "qrpredictionwix.firebasestorage.app",
            messagingSenderId: "1045444279571",
            appId: "1:1045444279571:web:02a98dec1d28c743d9aee6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const input = document.getElementById('prediction-input');
        const submitBtn = document.getElementById('submit-btn');
        const siteBtns = document.querySelectorAll('.site-btn');
        const liveStatus = document.getElementById('live-status');
        const qrImg = document.getElementById('target-qr-img');
        const downloadBtn = document.getElementById('download-qr');

        let selectedSite = 'google';
        const targetUrl = "https://myqronline.vercel.app/redirect.html";

        // Generate Target QR on load
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(targetUrl)}`;

        // Site selection logic (Instant highlight, no hover)
        function updateSiteUI(site) {
            selectedSite = site;
            siteBtns.forEach(btn => {
                if (btn.getAttribute('data-site') === site) {
                    btn.className = "site-btn flex-1 py-2.5 text-[10px] font-bold rounded-lg bg-slate-900 text-white transition-none";
                } else {
                    btn.className = "site-btn flex-1 py-2.5 text-[10px] font-bold rounded-lg bg-slate-50 text-slate-400 transition-none";
                }
            });
        }

        siteBtns.forEach(btn => {
            btn.onclick = () => updateSiteUI(btn.getAttribute('data-site'));
        });

        // Default selection
        updateSiteUI('google');

        // Auth
        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                submitBtn.disabled = false;
                onValue(ref(db, 'predictions/input'), (snap) => {
                    liveStatus.textContent = `Current: "${snap.val() || '-'}"`;
                });
            }
        });

        // Submit Logic
        submitBtn.onclick = async () => {
            const val = input.value.trim();
            if (!val) return;

            submitBtn.disabled = true;
            submitBtn.textContent = "...";

            try {
                await Promise.all([
                    set(ref(db, 'predictions/input'), val),
                    set(ref(db, 'predictions/site'), selectedSite)
                ]);
                input.value = "";
            } catch (e) {
                console.error(e);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit";
            }
        };

        // Download QR Logic
        downloadBtn.onclick = async () => {
            try {
                const response = await fetch(qrImg.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'target-qr-myqronline.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (err) {
                // Fallback for some browsers
                window.open(qrImg.src, '_blank');
            }
        };
    </script>
</body>
</html>
