<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perekam Suara Cerdas</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #d4d4d8;
            -webkit-tap-highlight-color: transparent;
        }

        .pulse-ring {
            animation: pulsate 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes pulsate {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.2s ease-out;
        }
        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
        }
        
        input {
            background-color: #18181b;
            border: 1px solid #27272a;
            color: #fafafa;
        }
        input:focus {
            border-color: #52525b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-zinc-800">

    <!-- Tombol Pengaturan -->
    <header class="w-full p-6 flex justify-end absolute top-0 z-10">
        <button id="settingsBtn" class="text-zinc-700 hover:text-zinc-500 p-3 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </header>

    <!-- Layar Utama -->
    <main class="flex-1 flex flex-col items-center justify-center relative">
        
        <div class="relative flex items-center justify-center w-48 h-48">
            <!-- Lingkaran Animasi Nyala -->
            <div id="micPulse" class="absolute inset-0 bg-zinc-800 rounded-full opacity-0 pointer-events-none"></div>
            
            <!-- Tombol Mik Utama -->
            <button id="micBtn" class="relative z-10 w-32 h-32 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center text-zinc-600 hover:text-zinc-400 hover:border-zinc-700 transition-all active:scale-95">
                <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
            </button>
        </div>

        <p id="statusText" class="mt-10 text-sm font-medium tracking-widest text-zinc-700 uppercase">Siap Digunakan</p>
        
        <p id="transcriptPreview" class="mt-4 px-8 text-sm text-zinc-800 text-center italic h-10 opacity-0 transition-opacity"></p>

    </main>

    <!-- Layar Pengaturan -->
    <div id="settingsModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 hidden items-center justify-center p-4 overflow-y-auto">
        <div id="settingsBox" class="bg-[#09090b] w-full max-w-sm border border-zinc-800 rounded-2xl p-6 modal-enter shadow-2xl my-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-semibold tracking-widest uppercase text-zinc-100">Pengaturan</h2>
                <button id="closeSettingsBtn" class="text-zinc-500 hover:text-zinc-300 p-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Petunjuk Penggunaan -->
            <div class="mb-6 bg-zinc-900/50 p-4 rounded-xl border border-zinc-800/50">
                <p class="text-xs text-zinc-400 leading-relaxed mb-2">
                    <span class="font-semibold text-zinc-300">Cara Kerja:</span> Kata di antara kata kunci di bawah akan disimpan. Gunakan koma (,) untuk variasi salah dengar.
                </p>
                <p class="text-[11px] text-zinc-500 italic">
                    Contoh variasi: pilih, bilih, tolong pilih
                </p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Kata Awal (Variasi)</label>
                    <input type="text" id="kwBefore" placeholder="contoh: pilih, bilih" class="w-full px-4 py-3 rounded-xl text-sm outline-none transition-colors">
                </div>
                
                <div>
                    <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Kata Akhir (Variasi)</label>
                    <input type="text" id="kwAfter" placeholder="contoh: benar, ya" class="w-full px-4 py-3 rounded-xl text-sm outline-none transition-colors">
                </div>

                <!-- Pemilihan Target Website -->
                <div class="pt-2">
                    <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Target URL</label>
                    <div class="flex gap-2">
                        <button data-site="google" class="site-btn flex-1 py-3 text-[10px] font-bold rounded-xl transition-none">GOOGLE</button>
                        <button data-site="tokopedia" class="site-btn flex-1 py-3 text-[10px] font-bold rounded-xl transition-none">TOKOPEDIA</button>
                        <button data-site="imdb" class="site-btn flex-1 py-3 text-[10px] font-bold rounded-xl transition-none">IMDb</button>
                    </div>
                </div>

                <div class="pt-4 mt-4 border-t border-zinc-800/50">
                    <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Status Target Terakhir</p>
                    <p id="dbStatus" class="text-sm text-zinc-300">Menghubungkan...</p>
                </div>
            </div>

            <button id="saveConfigBtn" class="w-full mt-8 bg-zinc-200 text-zinc-900 py-4 rounded-xl text-sm font-bold uppercase tracking-widest hover:bg-white transition-colors active:scale-95">
                Simpan Pengaturan
            </button>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsdaCltUZPkg0kl7-BIY-xfbkTnypyfxM",
            authDomain: "qrpredictionwix.firebaseapp.com",
            databaseURL: "https://qrpredictionwix-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrpredictionwix",
            storageBucket: "qrpredictionwix.firebasestorage.app",
            messagingSenderId: "1045444279571",
            appId: "1:1045444279571:web:02a98dec1d28c743d9aee6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Elemen UI
        const micBtn = document.getElementById('micBtn');
        const micPulse = document.getElementById('micPulse');
        const statusText = document.getElementById('statusText');
        const transcriptPreview = document.getElementById('transcriptPreview');
        
        const settingsBtn = document.getElementById('settingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveConfigBtn = document.getElementById('saveConfigBtn');
        const settingsModal = document.getElementById('settingsModal');
        const settingsBox = document.getElementById('settingsBox');
        
        const kwBeforeInput = document.getElementById('kwBefore');
        const kwAfterInput = document.getElementById('kwAfter');
        const dbStatus = document.getElementById('dbStatus');
        const siteBtns = document.querySelectorAll('.site-btn');

        // State Management
        let isManuallyStopped = true;
        let hasCaptured = false;
        
        // Pengaturan Lokal
        let keywordBeforeRaw = localStorage.getItem('vpred_kwBeforeRaw') || 'pilih, bilih, tolong pilih';
        let keywordAfterRaw = localStorage.getItem('vpred_kwAfterRaw') || 'benar, bener, ya';
        let selectedSite = localStorage.getItem('vpred_site') || 'google';
        
        kwBeforeInput.value = keywordBeforeRaw;
        kwAfterInput.value = keywordAfterRaw;

        // Logika Tombol Pemilihan Situs
        function updateSiteUI(site) {
            selectedSite = site;
            siteBtns.forEach(btn => {
                if (btn.getAttribute('data-site') === site) {
                    btn.className = "site-btn flex-1 py-3 text-[10px] font-bold rounded-xl bg-zinc-200 text-zinc-900 transition-none";
                } else {
                    btn.className = "site-btn flex-1 py-3 text-[10px] font-bold rounded-xl bg-[#18181b] text-zinc-600 border border-zinc-800 transition-none";
                }
            });
        }
        siteBtns.forEach(btn => btn.onclick = () => updateSiteUI(btn.getAttribute('data-site')));
        updateSiteUI(selectedSite);

        // Cek Firebase & Error Handling
        signInAnonymously(auth).catch((error) => {
            dbStatus.textContent = "Gagal menghubungkan";
            console.error("Auth Error:", error);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'predictions/input'), (snap) => {
                    dbStatus.textContent = `"${snap.val() || 'Belum ada kata'}"`;
                });
            }
        });

        // Setup Sensor Suara
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusText.textContent = "Browser tidak dukung suara";
            statusText.classList.remove('text-zinc-700');
            statusText.classList.add('text-red-900');
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'id-ID';

        // Buka / Tutup Pengaturan
        function toggleSettings(show) {
            if (show) {
                settingsModal.classList.remove('hidden');
                settingsModal.classList.add('flex');
                requestAnimationFrame(() => settingsBox.classList.add('modal-enter-active'));
            } else {
                settingsBox.classList.remove('modal-enter-active');
                setTimeout(() => {
                    settingsModal.classList.add('hidden');
                    settingsModal.classList.remove('flex');
                }, 200);
            }
        }

        settingsBtn.onclick = () => toggleSettings(true);
        closeSettingsBtn.onclick = () => toggleSettings(false);
        
        saveConfigBtn.onclick = () => {
            keywordBeforeRaw = kwBeforeInput.value.toLowerCase();
            keywordAfterRaw = kwAfterInput.value.toLowerCase();
            
            localStorage.setItem('vpred_kwBeforeRaw', keywordBeforeRaw);
            localStorage.setItem('vpred_kwAfterRaw', keywordAfterRaw);
            localStorage.setItem('vpred_site', selectedSite);
            
            toggleSettings(false);
        };

        // Kontrol Tombol Mik
        micBtn.onclick = () => {
            if (!SpeechRecognition) return;

            if (!isManuallyStopped) {
                isManuallyStopped = true;
                recognition.stop();
            } else {
                isManuallyStopped = false;
                hasCaptured = false;
                try {
                    recognition.start();
                } catch(e) {}
            }
        };

        recognition.onstart = () => {
            micPulse.classList.add('pulse-ring');
            micPulse.classList.remove('opacity-0');
            
            micBtn.classList.remove('text-zinc-600', 'border-zinc-800');
            micBtn.classList.add('text-zinc-200', 'border-zinc-600');
            
            statusText.textContent = "Mendengarkan...";
            statusText.classList.remove('text-zinc-700');
            statusText.classList.add('text-zinc-400');
            
            transcriptPreview.classList.remove('opacity-0');
            transcriptPreview.textContent = "";
        };

        recognition.onend = () => {
            // Auto restart kalau hening
            if (!isManuallyStopped && !hasCaptured) {
                try {
                    recognition.start();
                } catch(e) {}
                return;
            }

            micPulse.classList.remove('pulse-ring');
            micPulse.classList.add('opacity-0');
            
            micBtn.classList.remove('text-zinc-200', 'border-zinc-600');
            micBtn.classList.add('text-zinc-600', 'border-zinc-800');
            
            statusText.textContent = "Siap Digunakan";
            statusText.classList.remove('text-zinc-400');
            statusText.classList.add('text-zinc-700');
            
            setTimeout(() => {
                if(isManuallyStopped || hasCaptured) transcriptPreview.classList.add('opacity-0');
            }, 2000);
        };

        // Fungsi Pencarian Cerdas (Sinonim)
        function findKeyword(text, keywordString, startIndex = 0) {
            const keywords = keywordString.split(',').map(k => k.trim()).filter(k => k.length > 0);
            let bestIndex = -1;
            let foundWord = "";
            
            for (const kw of keywords) {
                const idx = text.indexOf(kw, startIndex);
                if (idx !== -1) {
                    if (bestIndex === -1 || idx < bestIndex) {
                        bestIndex = idx;
                        foundWord = kw;
                    }
                }
            }
            return { index: bestIndex, word: foundWord };
        }

        recognition.onresult = (event) => {
            if (hasCaptured) return;

            let fullTranscript = '';
            for (let i = 0; i < event.results.length; ++i) {
                fullTranscript += event.results[i][0].transcript;
            }
            
            const text = fullTranscript.toLowerCase();
            transcriptPreview.textContent = text;

            const beforeMatch = findKeyword(text, keywordBeforeRaw, 0);
            
            if (beforeMatch.index !== -1) {
                const targetStartIndex = beforeMatch.index + beforeMatch.word.length;
                const afterMatch = findKeyword(text, keywordAfterRaw, targetStartIndex);
                
                if (afterMatch.index !== -1) {
                    const targetData = text.substring(targetStartIndex, afterMatch.index).trim();
                    
                    if (targetData) {
                        hasCaptured = true;
                        isManuallyStopped = true; 
                        kirimKeFirebase(targetData);
                        recognition.stop();
                    }
                }
            }
        };

        recognition.onerror = (event) => {
            console.error("Suara error: ", event.error);
        };

        // Eksekusi Simpan ke Firebase (Teks Suara + URL Site)
        async function kirimKeFirebase(text) {
            statusText.textContent = "Menyimpan...";
            statusText.classList.remove('text-zinc-400');
            statusText.classList.add('text-white');
            try {
                await Promise.all([
                    set(ref(db, 'predictions/input'), text),
                    set(ref(db, 'predictions/site'), selectedSite)
                ]);
                
                transcriptPreview.textContent = "Berhasil ditangkap.";
                
                micBtn.style.backgroundColor = "#27272a";
                setTimeout(() => {
                    micBtn.style.backgroundColor = "";
                }, 300);

            } catch (err) {
                console.error("Gagal simpan ke database:", err);
                statusText.textContent = "Gagal Menyimpan";
            }
        }

    </script>
</body>
</html>
